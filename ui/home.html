<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>BankSym — Home</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --surface: #ffffff;
      --border: #e3e8ee;
      --text: #1a1f36;
      --muted: #697386;
      --shadow: 0 1px 2px rgba(16,24,40,.06), 0 1px 3px rgba(16,24,40,.05);
    }
    * { box-sizing: border-box; }
    html { scrollbar-gutter: stable; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #000;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: #000;
      color: #fff;
      padding: 14px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid #1d1d1d;
    }
    header .brand { display: flex; align-items: center; gap: 11px; }
    header h1 { margin: 0; font-size: 17px; font-weight: 600; letter-spacing: -.01em; color: #fff; }
    header .desc { margin: 2px 0 0; color: rgba(255,255,255,.6); font-size: 13px; }
    header nav { margin-left: auto; display: flex; gap: 4px; }
    header nav a { color: rgba(255,255,255,.8); text-decoration: none; font-size: 13px; font-weight: 500; padding: 7px 12px; border-radius: 8px; }
    header nav a:hover { background: rgba(255,255,255,.1); color: #fff; }
    header nav a.active { color: #fff; background: rgba(255,255,255,.14); }

    main {
      width: 100%;
      height: calc(100vh - 61px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      overflow: hidden;
    }
    .home-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #000;
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <svg width="38" height="24" viewBox="0 0 48 30" aria-hidden="true">
        <circle cx="19" cy="15" r="13" fill="#eb001b"></circle>
        <circle cx="29" cy="15" r="13" fill="#f79e1b" style="mix-blend-mode:screen"></circle>
      </svg>
      <div>
        <h1>BankSym</h1>
        <p class="desc">Home</p>
      </div>
    </div>
    <nav>
      <a href="/home" class="active">Home</a>
      <a href="/builder">Bank Builder</a>
      <a href="/console">Bank Console</a>
      <a href="/psd2">Open Banking</a>
      <a href="/live">Live</a>
      <a href="/docs">API Docs</a>
      <a href="/">Architecture</a>
    </nav>
  </header>

  <main>
    <img class="home-image" src="/home-hero.svg" alt="We simulate so we can better serve" />
  </main>
</body>
</html>
