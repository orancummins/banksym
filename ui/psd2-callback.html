<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Returning to the third party…</title>
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f6f8fb; color: #1a1f36; }
    .box { text-align: center; }
    .spinner { width: 30px; height: 30px; border: 3px solid #e3e8ee; border-top-color: #eb001b; border-radius: 50%; margin: 0 auto 14px; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg { font-size: 14px; color: #697386; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <div class="msg" id="msg">Completing authorisation…</div>
  </div>
  <script>
    const qs = new URLSearchParams(location.search);
    const payload = {
      type: "banksym-oauth",
      code: qs.get("code") || "",
      state: qs.get("state") || "",
      error: qs.get("error") || "",
    };
    // Hand the authorization code back to the TPP window that opened this popup.
    if (window.opener && !window.opener.closed) {
      window.opener.postMessage(payload, location.origin);
      document.getElementById("msg").textContent = "Authorised — you can close this window.";
      setTimeout(() => window.close(), 600);
    } else {
      // Fallback when opened as a full-page redirect: store and bounce back to the TPP.
      try { sessionStorage.setItem("banksym-oauth", JSON.stringify(payload)); } catch (_) {}
      document.getElementById("msg").textContent = "Authorised — return to the third-party app.";
    }
  </script>
</body>
</html>
