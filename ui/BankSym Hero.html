  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

alue=\"{{ showRings }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"position:absolute; inset:0; display:flex; align-items:center; justify-content:center;\">\n        <div style=\"position:absolute; width:760px; height:760px; border:1px solid rgba(240,120,40,.5); border-radius:50%; animation:scanRing 6s ease-out infinite;\"><\u002Fdiv>\n        <div style=\"position:absolute; width:760px; height:760px; border:1px solid rgba(240,120,40,.5); border-radius:50%; animation:scanRing 6s ease-out infinite; animation-delay:2s;\"><\u002Fdiv>\n        <div style=\"position:absolute; width:760px; height:760px; border:1px solid rgba(240,120,40,.5); border-radius:50%; animation:scanRing 6s ease-out infinite; animation-delay:4s;\"><\u002Fdiv>\n        <div style=\"position:absolute; width:560px; height:560px; border:1px dashed rgba(255,255,255,.10); border-radius:50%;\"><\u002Fdiv>\n        <div style=\"position:absolute; width:820px; height:820px; border:1px solid rgba(255,255,255,.05); border-radius:50%;\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- the two orbs -->\n    <div style=\"position:relative; width:520px; height:340px; animation:orbDrift 9s ease-in-out infinite;\">\n      <!-- soft ambient glow -->\n      <div style=\"position:absolute; left:-60px; top:-90px; width:520px; height:520px; border-radius:50%; background:radial-gradient(circle, rgba(230,60,40,.45), transparent 62%); filter:blur(20px);\"><\u002Fdiv>\n      <div style=\"position:absolute; right:-60px; top:-90px; width:520px; height:520px; border-radius:50%; background:radial-gradient(circle, rgba(245,170,30,.45), transparent 62%); filter:blur(20px);\"><\u002Fdiv>\n\n      <!-- red orb -->\n      <div style=\"position:absolute; left:0; top:0; width:340px; height:340px; border-radius:50%; mix-blend-mode:screen; background:radial-gradient(circle at 38% 34%, #ff5b46 0%, #e0301f 52%, #8f1108 100%); box-shadow:inset 0 0 60px rgba(0,0,0,.35); animation:corePulse 5s ease-in-out infinite;\"><\u002Fdiv>\n      <!-- yellow/amber orb -->\n      <div style=\"position:absolute; right:0; top:0; width:340px; height:340px; border-radius:50%; mix-blend-mode:screen; background:radial-gradient(circle at 62% 34%, #ffd34d 0%, #f79e1b 52%, #b45e05 100%); box-shadow:inset 0 0 60px rgba(0,0,0,.3); animation:corePulse 5s ease-in-out infinite; animation-delay:1.2s;\"><\u002Fdiv>\n\n      <!-- crisp orbit outlines for a 'modeled' look -->\n      <div style=\"position:absolute; left:0; top:0; width:340px; height:340px; border-radius:50%; border:1px solid rgba(255,255,255,.16);\"><\u002Fdiv>\n      <div style=\"position:absolute; right:0; top:0; width:340px; height:340px; border-radius:50%; border:1px solid rgba(255,255,255,.16);\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- subtle dark scrim over motif's left edge so text stays crisp -->\n  <div style=\"position:absolute; inset:0; background:linear-gradient(90deg, #060504 0%, #060504 30%, rgba(6,5,4,.7) 52%, transparent 72%); pointer-events:none;\"><\u002Fdiv>\n\n  <!-- ====== CONTENT ====== -->\n  <div style=\"position:absolute; inset:0; padding:104px 120px; display:flex; flex-direction:column; justify-content:space-between;\">\n\n    <!-- kicker -->\n    <div style=\"display:none; align-items:center; gap:18px;\">\n      <span style=\"font-size:23px; font-weight:800; letter-spacing:-.01em;\"><\u002Fspan>\n      <span style=\"width:6px; height:6px; border-radius:50%; background:linear-gradient(135deg,#e0301f,#f79e1b);\"><\u002Fspan>\n      <span style=\"font-size:14px; font-weight:600; letter-spacing:.32em; text-transform:uppercase; color:rgba(255,255,255,.52);\"><\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- tagline -->\n    <div style=\"max-width:1180px;\">\n      <div style=\"display:inline-flex; align-items:center; gap:12px; margin-bottom:34px; padding:8px 16px 8px 12px; border:1px solid rgba(255,255,255,.14); border-radius:999px;\">\n        <span style=\"width:8px; height:8px; border-radius:50%; background:#f79e1b; box-shadow:0 0 12px rgba(247,158,27,.9);\"><\u002Fspan>\n        <span style=\"font-size:14px; font-weight:600; letter-spacing:.22em; text-transform:uppercase; color:rgba(255,255,255,.66);\">Simulated banking environments<\u002Fspan>\n      <\u002Fdiv>\n      <h1 style=\"font-size:128px; line-height:1.0; font-weight:800; letter-spacing:-.025em;\">\n        We <span style=\"background:linear-gradient(96deg,#ff5b46 0%,#f79e1b 52%,#ffce4d 100%); -webkit-background-clip:text; background-clip:text; color:transparent;\">simulate<\u002Fspan><br>\n        so we can better service.\n      <\u002Fh1>\n      <p style=\"margin-top:34px; max-width:720px; font-size:22px; line-height:1.5; font-weight:400; color:rgba(255,255,255,.6);\">\n        A controlled environment that emulates banks end‑to‑end — so every Mastercard powered interaction is proven great before it ever reaches a real consumer\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <!-- services row -->\n    <sc-if value=\"{{ showServices }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex; align-items:center; flex-wrap:wrap; gap:14px 26px; padding-top:30px; border-top:1px solid rgba(255,255,255,.1); max-width:1320px;\">\n        <span style=\"display:flex; align-items:center; gap:10px; font-size:15px; font-weight:600; letter-spacing:.05em; color:rgba(255,255,255,.74);\"><span style=\"width:5px; height:5px; border-radius:50%; background:#e0301f;\"><\u002Fspan>Card types<\u002Fspan>\n        <span style=\"display:flex; align-items:center; gap:10px; font-size:15px; font-weight:600; letter-spacing:.05em; color:rgba(255,255,255,.74);\"><span style=\"width:5px; height:5px; border-radius:50%; background:#ef5a1c;\"><\u002Fspan>Account‑to‑account<\u002Fspan>\n        <span style=\"display:flex; align-items:center; gap:10px; font-size:15px; font-weight:600; letter-spacing:.05em; color:rgba(255,255,255,.74);\"><span style=\"width:5px; height:5px; border-radius:50%; background:#f47a18;\"><\u002Fspan>Open banking<\u002Fspan>\n        <span style=\"display:flex; align-items:center; gap:10px; font-size:15px; font-weight:600; letter-spacing:.05em; color:rgba(255,255,255,.74);\"><span style=\"width:5px; height:5px; border-radius:50%; background:#f79e1b;\"><\u002Fspan>Physical &amp; digital enablement<\u002Fspan>\n        <span style=\"display:flex; align-items:center; gap:10px; font-size:15px; font-weight:600; letter-spacing:.05em; color:rgba(255,255,255,.74);\"><span style=\"width:5px; height:5px; border-radius:50%; background:#f79e1b;\"><\u002Fspan>Enhanced UX<\u002Fspan>\n        <span style=\"display:flex; align-items:center; gap:10px; font-size:15px; font-weight:600; letter-spacing:.05em; color:rgba(255,255,255,.74);\"><span style=\"width:5px; height:5px; border-radius:50%; background:#f0b021;\"><\u002Fspan>Fraud prevention<\u002Fspan>\n        <span style=\"display:flex; align-items:center; gap:10px; font-size:15px; font-weight:600; letter-spacing:.05em; color:rgba(255,255,255,.74);\"><span style=\"width:5px; height:5px; border-radius:50%; background:#f4c33a;\"><\u002Fspan>Compliance<\u002Fspan>\n        <span style=\"display:flex; align-items:center; gap:10px; font-size:15px; font-weight:600; letter-spacing:.05em; color:rgba(255,255,255,.74);\"><span style=\"width:5px; height:5px; border-radius:50%; background:#ffce4d;\"><\u002Fspan>Consultancy<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1920, &quot;height&quot;: 1080 },\n  &quot;showGrid&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; },\n  &quot;showRings&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; },\n  &quot;showServices&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; }\n}\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      showGrid: this.props.showGrid ?? true,\n      showRings: this.props.showRings ?? true,\n      showServices: this.props.showServices ?? true,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
